<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub+ Settings</title>
    <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="popup-header">
            <a href="https://github.com" target="_blank" class="github-link" title="Visit GitHub" rel="noopener noreferrer">
                <h1>GitHub+</h1>
            </a>
            <span class="version" id="version"></span>
        </div>
        
        <div class="popup-content">
            <h2>Features</h2>
            <div class="toggle-group">
                <label class="toggle-item">
                    <input type="checkbox" id="toggle-badges" class="toggle-checkbox">
                    <span class="toggle-label">Visibility Badges</span>
                </label>
                
                <label class="toggle-item">
                    <input type="checkbox" id="toggle-pagination" class="toggle-checkbox">
                    <span class="toggle-label">Enhanced Pagination</span>
                </label>
                
                <label class="toggle-item">
                    <input type="checkbox" id="toggle-vscode" class="toggle-checkbox">
                    <span class="toggle-label">VS Code Button</span>
                </label>
                
                <label class="toggle-item">
                    <input type="checkbox" id="toggle-repo-info" class="toggle-checkbox">
                    <span class="toggle-label">Repository Info</span>
                </label>
                
                <label class="toggle-item">
                    <input type="checkbox" id="toggle-contributors" class="toggle-checkbox">
                    <span class="toggle-label">Contributor Stats</span>
                </label>
                
                <label class="toggle-item">
                    <input type="checkbox" id="toggle-private-email" class="toggle-checkbox">
                    <span class="toggle-label">Email Copy</span>
                </label>
            </div>
        </div>
    </div>
    
    <script src="scripts/popup.js"></script>
</body>
</html>
